<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>CATTI 二级笔译核心考点</title>
<meta name="viewport" content="width=device-width,Jinitial-scale=1.0"/>
<style>
:root{--primary:#1f4fa3;--bg:#f4f6fb;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:#222;}
header{background:var(--primary);color:#fff;padding:1.2rem;text-align:center;}
nav{display:flex;justify-content:center;gap:.8rem;background:#fff;padding:.7rem;position:sticky;top:0;z-index:99;flex-wrap:wrap;}
nav button{border:none;background:none;font-size:.95rem;padding:.35rem .7rem;cursor:pointer;}
nav button.active{border-bottom:2px solid var(--primary);font-weight:700;}
input[type="search"]{width:92%;max-width:520px;display:block;margin:1rem auto;padding:.55rem;font-size:1rem;}
section{max-width:920px;margin:auto;padding:1rem;}
details{background:#fff;border-radius:6px;padding:1rem;margin-bottom:.9rem;box-shadow:0 2px 6px rgba(0,0,0,.06);}
summary{font-weight:700;cursor:pointer;}
.en{color:var(--primary);font-style:italic;margin-top:.4rem;}
footer{text-align:center;font-size:.85rem;color:#666;padding:1.5rem;}
</style>
</head>

<body>

<header>
  <h1>CATTI 二级笔译 · 核心考点</h1>
  <p>文本类型｜热点词汇｜国务院标准英文</p>
</header>

<nav>
  <button data-cat="all" class="active">全部</button>
  <button data-cat="politics">时政外交</button>
  <button data-cat="economy">经济社会</button>
  <button data-cat="culture">文化教育</button>
 1<button data-cat="tech">科技环保</button>
</nav>

<input type="search" id="search" placeholder="搜索中文 / 英文…" />

<section id="content"></section>

<footer>
  <p>国务院标准英文来源：<a href="https://www.gov.cn" target="_blank">www.gov.cn</a></p>
</footer>

<script>
const data = [
  // 时政外交
  {cat:"politics", zh:"国务院", en:"the State Council of the People's Republic of China"},
  {cat:"politics", zh:"总理", en:"Premier of the State Council"},
  {cat:"politics", zh:"外交部", en:"Ministry of Foreign Affairs"},
  {cat:"politics", zh:"白皮书", en:"white paper"},
  {cat:"politics", zh:"人类命运共同体", en:"a community with a shared future for mankind"},
  {cat:"politics", zh:"多边主义", en:"multilateralism"},

  // 经济社会
  {cat:"economy", zh:"一带一路", en:"the Belt and Road Initiative"},
  {cat:"economy", zh:"供给侧结构性改革", en:"supply-side structural reform"},
  {cat:"economy", zh:"高质量发展", en:"high-quality development"},
  {cat:"economy", zh:"精准扶贫", en:"targeted poverty alleviation"},
  {cat:"economy", zh:"宏观经济", en:"macro-economy"},

  // 文化教育
  {cat:"culture", zh:"中华优秀传统文化", en:"fine traditional Chinese culture"},
  {cat:"culture", zh:"义务教育", en:"compulsory education"},
  {cat:"culture", zh:"文化遗产", en:"cultural heritage"},
  {cat:"culture", zh:"文化自信", en:"cultural confidence"},

  // 科技环保
  {cat:"tech", zh:"碳中和", en:"carbon neutrality"},
  {cat:"tech", zh:"碳达峰", en:"carbon peaking"},
  {cat:"tech", zh:"人工智能", en:"artificial intelligence"},
  {cat:"tech", zh:"公共卫生", en:"public health"},
  {cat:"tech", zh:"可持续发展", en:"sustainable development"}
];

const content = document.getElementById("content");
const search = document.getElementById("search");

function render(cat, kw){
  content.innerHTML = "";
  data.filter(d =>
    (cat==="all"||d.cat===cat) &&
    (!kw || d.zh.includes(kw) || d.en.toLowerCase().includes(kw.toLowerCase()))
  ).forEach(d => {
    const el = document.createElement("details");
    el.innerHTML = `<summary>${d.zh}</summary><div class="en">${d.en}</div>`;
    content.appendChild(el);
  });
}

document.querySelector("nav").onclick = e => {
  if(e.target.tagName!=="BUTTON") return;
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  render(e.target.dataset.cat, search.value);
};
search.oninput = () => render(document.querySelector("nav button.active").dataset.cat, search.value);

render("all");
</script>

</body>
</html>
